name: Auto Release + Docker

on:
  workflow_dispatch:
  schedule:
    - cron: "24 4 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.upstream.outputs.version }}
      should_build: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Get latest upstream version + notes
        id: upstream
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/dciancu/unifi-protect-unvr-docker-arm64/releases/latest)

          VERSION=$(echo "$RESPONSE" | jq -r .tag_name)
          BODY=$(echo "$RESPONSE" | jq -r .body)

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "## 🚀 Upstream Release $VERSION" > notes.md
          echo "" >> notes.md
          echo "$BODY" >> notes.md
          echo "" >> notes.md

          echo "## 🐳 Docker Image" >> notes.md
          echo "- Built automatically from upstream release" >> notes.md
          echo "- Includes Cockpit support" >> notes.md
          echo "- Image: ghcr.io/${{ github.repository }}:$VERSION" >> notes.md

      - name: Get current repo release
        id: current
        run: |
          CURRENT=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if new version exists
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" = "${{ steps.current.outputs.current }}" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.version }}
          name: Release ${{ steps.upstream.outputs.version }}
          body_path: notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Docker
    needs: release
    if: needs.release.outputs.should_build == 'true'

    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set version
        run: echo "VERSION=${{ needs.release.outputs.version }}" >> $GITHUB_ENV

      - name: Download release tarball
        run: |
          echo "Building for version: $VERSION"
          curl -sL "https://github.com/dciancu/unifi-protect-unvr-docker-arm64/archive/refs/tags/${VERSION}.tar.gz" -o ${VERSION}.tar.gz

      - name: Extract tar.gz
        run: |
          tar -xzf ${VERSION}.tar.gz
          DIR_NAME=$(tar -tzf ${VERSION}.tar.gz | head -1 | cut -f1 -d"/")
          echo "DIR_NAME=$DIR_NAME" >> $GITHUB_ENV

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.DIR_NAME }}
          file: ${{ env.DIR_NAME }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PROTECT_STABLE=1
            SRC_DIR=${{ env.DIR_NAME }}

      - name: Sign Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}